<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Circuit Vault — Admin Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #06090e;
      --bg-panel: #0c1119;
      --bg-panel-2: #0a0f16;
      --line: #1a2330;
      --line-soft: #141d28;
      --copper: #c77b3f;
      --teal: #00d9b5;
      --teal-dim: #0a4a40;
      --gold: #e8b84c;
      --text: #e7ecef;
      --text-muted: #7c8894;
      --danger: #e5566b;
      --purple: #a78bfa;
      --blue: #60a5fa;
      --radius: 16px;
      --radius-sm: 12px;
      --nav-height: 68px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 20px);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--line-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 50% at 50% 30%, black 20%, transparent 70%);
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }

    .app-container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
    }

    .topbar h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .topbar .user-count {
      font-size: 12px;
      color: var(--text-muted);
      font-family: "JetBrains Mono", monospace;
    }

    .stats-mini {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stat-mini {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 16px;
      text-align: center;
    }

    .stat-mini-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .stat-mini-value.teal { color: var(--teal); }
    .stat-mini-value.gold { color: var(--gold); }
    .stat-mini-value.purple { color: var(--purple); }
    .stat-mini-value.danger { color: var(--danger); }

    .stat-mini-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,217,181,0.1); }

    .filter-select {
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .btn-sm {
      padding: 10px 16px;
      border-radius: 8px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
      background: linear-gradient(135deg, var(--teal), #00b894);
      color: #12100a;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-sm:hover { filter: brightness(1.08); }

    .table-container {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow-x: auto;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th {
      font-family: "JetBrains Mono", monospace;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: left;
      padding: 12px 14px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    td {
      padding: 10px 14px;
      font-size: 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    tr:hover td { background: rgba(255,255,255,0.01); }
    tr:last-child td { border-bottom: none; }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(0,217,181,0.1);
      display: flex; align-items: center; justify-content: center;
      font-family: "Space Grotesk", sans-serif;
      font-size: 12px; font-weight: 700;
      color: var(--teal);
      flex-shrink: 0;
    }

    .status-badge {
      font-family: "JetBrains Mono", monospace;
      font-size: 7px;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-badge.active { background: rgba(0,217,181,0.12); color: var(--teal); }
    .status-badge.suspended { background: rgba(229,86,107,0.12); color: var(--danger); }
    .status-badge.inactive { background: rgba(124,136,148,0.12); color: var(--text-muted); }
    .status-badge.deleted { background: rgba(229,86,107,0.08); color: #99444d; }

    .funded-badge {
      font-family: "JetBrains Mono", monospace;
      font-size: 7px;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .funded-badge.yes { background: rgba(232,184,76,0.12); color: var(--gold); }
    .funded-badge.no { background: rgba(124,136,148,0.08); color: var(--text-muted); }

    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }

    .action-btn {
      padding: 4px 8px;
      border-radius: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 8px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      transition: all 0.2s;
      white-space: nowrap;
    }

    .action-btn:hover { border-color: var(--teal); color: var(--teal); }
    .action-btn.warn { color: var(--gold); border-color: rgba(232,184,76,0.3); }
    .action-btn.warn:hover { background: rgba(232,184,76,0.1); }
    .action-btn.danger { color: var(--danger); border-color: rgba(229,86,107,0.3); }
    .action-btn.danger:hover { background: rgba(229,86,107,0.1); }
    .action-btn.teal { color: var(--teal); border-color: rgba(0,217,181,0.3); }
    .action-btn.teal:hover { background: rgba(0,217,181,0.1); }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .page-btn {
      padding: 8px 14px;
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      transition: all 0.2s;
    }

    .page-btn:hover { border-color: var(--teal); color: var(--teal); }
    .page-btn.active { background: rgba(0,217,181,0.1); border-color: var(--teal); color: var(--teal); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      width: 90%;
      max-width: 550px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px 24px;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal h3 { font-family: "Space Grotesk", sans-serif; font-size: 18px; margin-bottom: 16px; }
    .modal .close-btn { float: right; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
    .modal .close-btn:hover { color: var(--text); }

    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line-soft); font-size: 12px; }
    .detail-row .label { color: var(--text-muted); }
    .detail-row .value { font-weight: 500; text-align: right; }

    .modal-input { width: 100%; background: #0b0f14; border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: "Inter", sans-serif; font-size: 13px; outline: none; margin-bottom: 10px; }
    .modal-input:focus { border-color: var(--teal); }
    .modal-label { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: block; }

    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 10px; font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; border: none; transition: all 0.2s; }
    .modal-btn.primary { background: linear-gradient(135deg, var(--gold), var(--copper)); color: #12100a; }
    .modal-btn.primary:hover { filter: brightness(1.08); }
    .modal-btn.cancel { background: transparent; border: 1px solid var(--line); color: var(--text-muted); }
    .modal-btn.cancel:hover { border-color: var(--teal); color: var(--teal); }
    .modal-btn.danger { background: rgba(229,86,107,0.1); border: 1px solid rgba(229,86,107,0.3); color: var(--danger); }
    .modal-btn.danger:hover { background: rgba(229,86,107,0.2); }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast-stack { position: fixed; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 999; width: min(320px, calc(100vw - 32px)); }
    .toast { background: var(--bg-panel); border: 1px solid var(--line); border-left: 3px solid var(--teal); border-radius: 12px; padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; box-shadow: 0 20px 50px -15px rgba(0,0,0,0.6); transform: translateX(120%); opacity: 0; animation: toastIn 0.35s cubic-bezier(0.2,0.8,0.2,1) forwards; }
    .toast.leaving { animation: toastOut 0.25s ease forwards; }
    @keyframes toastIn { to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }
    .toast.success { border-left-color: var(--teal); }
    .toast.error { border-left-color: var(--danger); }
    .toast.info { border-left-color: var(--gold); }
    .toast-icon { width: 18px; height: 18px; flex: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700; }
    .toast.success .toast-icon { background: rgba(0,217,181,0.15); color: var(--teal); }
    .toast.error .toast-icon { background: rgba(229,86,107,0.15); color: var(--danger); }
    .toast.info .toast-icon { background: rgba(232,184,76,0.15); color: var(--gold); }
    .toast-body { flex: 1; }
    .toast-title { font-size: 12.5px; font-weight: 600; margin-bottom: 2px; }
    .toast-msg { font-size: 11.5px; color: var(--text-muted); line-height: 1.4; }
    .toast-close { background: none; border: none; color: #4d5a66; cursor: pointer; font-size: 13px; padding: 2px; }
    .toast-close:hover { color: var(--text); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height);
      background: linear-gradient(180deg, rgba(12,17,25,0.98) 0%, rgba(6,9,14,0.99) 100%);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 2px solid var(--line);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 2px; padding-bottom: var(--safe-bottom);
      z-index: 100; overflow-x: auto;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 8px; border-radius: 8px; text-decoration: none; color: var(--text-muted); transition: all 0.2s; min-width: 56px; cursor: pointer; position: relative; flex-shrink: 0; }
    .nav-item svg { width: 20px; height: 20px; }
    .nav-item span { font-size: 8px; font-weight: 500; letter-spacing: 0.03em; white-space: nowrap; }
    .nav-item.active { color: #f87171; }
    .nav-item.active::before { content: ""; position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 18px; height: 2px; background: #f87171; border-radius: 0 0 4px 4px; }
    .nav-item:hover { color: #f87171; }
    .nav-item:active { transform: scale(0.92); }

    @media (max-width: 768px) { .nav-item span { font-size: 7px; } }
  </style>
</head>
<body>

  <div class="toast-stack" id="toastStack"></div>
  <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

  <div class="app-container">
    <div class="topbar">
      <h1>👥 User Management</h1>
      <span class="user-count" id="userCount">— users</span>
    </div>

    <div class="stats-mini">
      <div class="stat-mini"><div class="stat-mini-value teal" id="statTotal">0</div><div class="stat-mini-label">Total Users</div></div>
      <div class="stat-mini"><div class="stat-mini-value gold" id="statActive">0</div><div class="stat-mini-label">Active</div></div>
      <div class="stat-mini"><div class="stat-mini-value danger" id="statSuspended">0</div><div class="stat-mini-label">Suspended</div></div>
      <div class="stat-mini"><div class="stat-mini-value purple" id="statAdminFunded">0</div><div class="stat-mini-label">Admin Funded</div></div>
      <div class="stat-mini"><div class="stat-mini-value teal" id="statTotalBalance">$0</div><div class="stat-mini-label">Total Balance</div></div>
    </div>

    <div class="controls-row">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by username, email, phone, or UID..." />
      <select class="filter-select" id="filterStatus">
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="suspended">Suspended</option>
        <option value="inactive">Inactive</option>
      </select>
      <a href="admin-create-user.html" class="btn-sm">➕ Create User</a>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email / Phone</th>
            <th>Balance</th>
            <th>Status</th>
            <th>Funded</th>
            <th>Refs</th>
            <th>Invited By</th>
            <th>Registered</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="9"><div class="empty-state">Loading all users...</div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <nav class="bottom-nav">
    <a href="admin-dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="8" height="8" rx="1.5"/><rect x="14" y="2" width="8" height="8" rx="1.5"/><rect x="2" y="14" width="8" height="8" rx="1.5"/><rect x="14" y="14" width="8" height="8" rx="1.5"/></svg><span>Dashboard</span></a>
    <a href="admin-users.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg><span>Users</span></a>
    <a href="admin-deposits.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 4v14M6 12l6 6 6-6"/><path d="M4 22h16"/></svg><span>Deposits</span></a>
    <a href="admin-plans.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg><span>Plans</span></a>
    <a href="admin-referrals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><circle cx="17" cy="17" r="3"/><path d="M12 10l3.5 4.5"/></svg><span>Referrals</span></a>
    <a href="admin-settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg><span>Settings</span></a>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp,
      collection, query, where, getDocs, orderBy, increment
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBGYofP0i5qwQHpvlt8KynRYbE7tVuk2rw",
      authDomain: "circuit-vault-25fc5.firebaseapp.com",
      projectId: "circuit-vault-25fc5",
      storageBucket: "circuit-vault-25fc5.firebasestorage.app",
      messagingSenderId: "721270431353",
      appId: "1:721270431353:web:8d43b3176a14e665953ea8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const stack = document.getElementById('toastStack');
    function toast(type, title, msg, ms = 4000) {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      const icon = type === 'success' ? '✓' : type === 'error' ? '!' : 'i';
      el.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close" aria-label="Dismiss">✕</button>`;
      stack.appendChild(el);
      const remove = () => { el.classList.add('leaving'); setTimeout(() => el.remove(), 250); };
      el.querySelector('.toast-close').addEventListener('click', remove);
      if (ms) setTimeout(remove, ms);
    }

    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    function openModal(html) { modalContent.innerHTML = html; modalOverlay.classList.add('active'); }
    function closeModal() { modalOverlay.classList.remove('active'); }
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

    let allUsers = [];
    let currentAdmin = null;
    const PER_PAGE = 25;
    let currentPage = 1;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'admin-login.html'; return; }
      const snap = await getDoc(doc(db, 'admins', user.uid));
      if (!snap.exists()) { await signOut(auth); window.location.href = 'admin-login.html'; return; }
      currentAdmin = user;
      loadUsers();
    });

    document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderTable(); });
    document.getElementById('filterStatus').addEventListener('change', () => { currentPage = 1; renderTable(); });

    async function loadUsers() {
      try {
        // ✅ NO LIMIT — loads ALL users
        const snap = await getDocs(query(collection(db, 'users'), orderBy('createdAt', 'desc')));
        allUsers = [];
        snap.forEach(d => allUsers.push({ uid: d.id, ...d.data() }));

        // Calculate referral counts
        for (const u of allUsers) {
          u._refCount = allUsers.filter(x => x.invitedBy === u.uid).length;
          if (u.invitedBy) {
            const inviter = allUsers.find(x => x.uid === u.invitedBy);
            u._inviterName = inviter?.username || u.invitedBy.slice(0, 8) + '...';
          }
        }

        updateStats();
        renderTable();
        document.getElementById('userCount').textContent = `${allUsers.length} users loaded`;
      } catch (e) {
        console.error('Load error:', e);
        document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="9"><div class="empty-state">Error loading users</div></td></tr>';
      }
    }

    function updateStats() {
      let active = 0, suspended = 0, adminFunded = 0, totalBalance = 0;
      allUsers.forEach(u => {
        if (u.status === 'active' || !u.status) active++;
        if (u.status === 'suspended') suspended++;
        if (u.adminFunded) adminFunded++;
        totalBalance += (u.balance || 0);
      });
      document.getElementById('statTotal').textContent = allUsers.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statSuspended').textContent = suspended;
      document.getElementById('statAdminFunded').textContent = adminFunded;
      document.getElementById('statTotalBalance').textContent = '$' + totalBalance.toLocaleString('en-US', { minimumFractionDigits: 2 });
    }

    function getFiltered() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('filterStatus').value;
      return allUsers.filter(u => {
        const matchSearch = !search ||
          (u.username || '').toLowerCase().includes(search) ||
          (u.email || '').toLowerCase().includes(search) ||
          (u.phone || '').toLowerCase().includes(search) ||
          (u.uid || '').toLowerCase().includes(search);
        const matchStatus = status === 'all' || (u.status || 'active') === status;
        return matchSearch && matchStatus;
      });
    }

    function renderTable() {
      const filtered = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const pageData = filtered.slice(start, start + PER_PAGE);
      const tbody = document.getElementById('usersTableBody');

      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state">No users found</div></td></tr>';
      } else {
        tbody.innerHTML = pageData.map(u => {
          const initial = (u.username || 'U').charAt(0).toUpperCase();
          const balance = (u.balance || 0).toFixed(2);
          const status = u.status || 'active';
          const funded = u.adminFunded ? 'Yes' : 'No';
          const fundedClass = u.adminFunded ? 'yes' : 'no';
          const joinDate = u.createdAt
            ? new Date(u.createdAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            : '—';
          const joinTime = u.createdAt
            ? new Date(u.createdAt.seconds * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
            : '';

          return `
            <tr>
              <td>
                <div class="user-cell">
                  <div class="user-avatar">${initial}</div>
                  <div>
                    <div style="font-weight:600;font-size:13px;">${u.username || 'Anonymous'}</div>
                    <div style="font-size:9px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;">${u.uid?.slice(0, 12)}...</div>
                  </div>
                </div>
              </td>
              <td>
                <div style="font-size:12px;">${u.email || '—'}</div>
                ${u.phone ? `<div style="font-size:10px;color:var(--text-muted);">📱 ${u.phone}</div>` : ''}
              </td>
              <td style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;">$${balance}</td>
              <td><span class="status-badge ${status}">${status}</span></td>
              <td><span class="funded-badge ${fundedClass}">${funded}</span></td>
              <td style="font-weight:600;color:var(--gold);">${u._refCount || 0}</td>
              <td style="font-size:11px;color:var(--text-muted);">${u._inviterName || '—'}</td>
              <td>
                <div style="font-size:11px;">${joinDate}</div>
                <div style="font-size:9px;color:var(--text-muted);">${joinTime}</div>
              </td>
              <td>
                <div class="action-btns">
                  <button class="action-btn" data-action="view" data-uid="${u.uid}">👁</button>
                  <button class="action-btn warn" data-action="fund" data-uid="${u.uid}">+$</button>
                  <button class="action-btn teal" data-action="deduct" data-uid="${u.uid}">-$</button>
                  ${status === 'active'
                    ? `<button class="action-btn danger" data-action="suspend" data-uid="${u.uid}">⏸</button>`
                    : `<button class="action-btn teal" data-action="activate" data-uid="${u.uid}">▶</button>`}
                  <button class="action-btn danger" data-action="delete" data-uid="${u.uid}">✕</button>
                </div>
              </td>
            </tr>`;
        }).join('');
      }

      const pag = document.getElementById('pagination');
      if (totalPages <= 1) { pag.innerHTML = ''; return; }
      let html = `<button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}">←</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      }
      html += `<button class="page-btn" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">→</button>`;
      pag.innerHTML = html;
      pag.querySelectorAll('.page-btn:not([disabled])').forEach(b => {
        b.addEventListener('click', () => { currentPage = parseInt(b.dataset.page); renderTable(); });
      });
    }

    // ═══════════ ACTIONS ═══════════
    document.getElementById('usersTableBody').addEventListener('click', async (e) => {
      const btn = e.target.closest('.action-btn');
      if (!btn) return;
      const action = btn.dataset.action;
      const uid = btn.dataset.uid;
      const user = allUsers.find(u => u.uid === uid);
      if (!user) return;

      switch (action) {
        case 'view': viewUser(user); break;
        case 'fund': fundUser(user); break;
        case 'deduct': deductUser(user); break;
        case 'suspend': await toggleStatus(user, 'suspended'); break;
        case 'activate': await toggleStatus(user, 'active'); break;
        case 'delete': deleteUser(user); break;
      }
    });

    function viewUser(user) {
      const joinDate = user.createdAt ? new Date(user.createdAt.seconds * 1000).toLocaleString() : '—';
      openModal(`
        <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3>👤 ${user.username || 'User'} — Full Details</h3>
        <div class="detail-row"><span class="label">Username</span><span class="value">${user.username || '—'}</span></div>
        <div class="detail-row"><span class="label">Email</span><span class="value">${user.email || '—'}</span></div>
        <div class="detail-row"><span class="label">Phone</span><span class="value">${user.phone || '—'}</span></div>
        <div class="detail-row"><span class="label">UID</span><span class="value" style="font-family:'JetBrains Mono',monospace;font-size:10px;">${user.uid}</span></div>
        <div class="detail-row"><span class="label">Balance</span><span class="value" style="color:var(--teal);font-weight:700;">$${(user.balance||0).toFixed(2)}</span></div>
        <div class="detail-row"><span class="label">Status</span><span class="value"><span class="status-badge ${user.status||'active'}">${user.status||'active'}</span></span></div>
        <div class="detail-row"><span class="label">Admin Funded</span><span class="value">${user.adminFunded ? '✅ Yes' : '❌ No'}</span></div>
        <div class="detail-row"><span class="label">Referrals</span><span class="value" style="color:var(--gold);">${user._refCount || 0}</span></div>
        <div class="detail-row"><span class="label">Invited By</span><span class="value">${user._inviterName || 'None'}</span></div>
        <div class="detail-row"><span class="label">Currency</span><span class="value">${user.currency || 'USD'}</span></div>
        <div class="detail-row"><span class="label">Registered</span><span class="value">${joinDate}</span></div>
        ${user.createdBy ? `<div class="detail-row"><span class="label">Created By</span><span class="value">Admin (${user.createdBy.slice(0,10)}...)</span></div>` : ''}
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="document.getElementById('modalOverlay').classList.remove('active')">Close</button>
          <button class="modal-btn primary" id="modalFundBtn">+ Fund</button>
          <button class="modal-btn danger" id="modalDeductBtn" style="background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3);color:#f59e0b;">- Deduct</button>
        </div>
      `);
      setTimeout(() => {
        document.getElementById('modalFundBtn')?.addEventListener('click', () => { closeModal(); fundUser(user); });
        document.getElementById('modalDeductBtn')?.addEventListener('click', () => { closeModal(); deductUser(user); });
      }, 100);
    }

    function fundUser(user) {
      openModal(`
        <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3>💰 Fund: ${user.username}</h3>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Balance: <strong style="color:var(--teal);">$${(user.balance||0).toFixed(2)}</strong></p>
        <label class="modal-label">Amount (USD)</label>
        <input type="number" class="modal-input" id="fundAmount" placeholder="0.00" min="0.01" step="0.01" />
        <label class="modal-label">Note</label>
        <input type="text" class="modal-input" id="fundNote" placeholder="Admin funding" />
        <div id="fundError" style="color:var(--danger);font-size:11px;margin-bottom:8px;"></div>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="document.getElementById('modalOverlay').classList.remove('active')">Cancel</button>
          <button class="modal-btn primary" id="confirmFund">Confirm</button>
        </div>
      `);
      setTimeout(() => {
        document.getElementById('confirmFund').addEventListener('click', async () => {
          const amount = parseFloat(document.getElementById('fundAmount').value);
          const note = document.getElementById('fundNote').value || 'Admin funding';
          if (!amount || amount <= 0) { document.getElementById('fundError').textContent = 'Enter valid amount.'; return; }
          const btn = document.getElementById('confirmFund');
          btn.disabled = true; btn.textContent = '...';
          try {
            await updateDoc(doc(db, 'users', user.uid), { balance: increment(amount) });
            const txnId = `fund_${Date.now()}`;
            await setDoc(doc(db, 'users', user.uid, 'transactions', txnId), { type: 'deposit', amount, description: note, status: 'credited', createdAt: serverTimestamp() });
            await setDoc(doc(db, 'adminLogs', txnId), { adminId: currentAdmin.uid, action: 'fund_user', targetUserId: user.uid, amount, note, createdAt: serverTimestamp() });
            toast('success','Funded',`$${amount.toFixed(2)} added.`);
            closeModal(); loadUsers();
          } catch(e) { document.getElementById('fundError').textContent = e.message; btn.disabled = false; btn.textContent = 'Confirm'; }
        });
      }, 100);
    }

    function deductUser(user) {
      openModal(`
        <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3>🔻 Deduct: ${user.username}</h3>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Balance: <strong style="color:var(--teal);">$${(user.balance||0).toFixed(2)}</strong></p>
        <label class="modal-label">Amount (USD)</label>
        <input type="number" class="modal-input" id="deductAmount" placeholder="0.00" min="0.01" step="0.01" />
        <label class="modal-label">Reason</label>
        <input type="text" class="modal-input" id="deductReason" placeholder="e.g., Adjustment" />
        <div id="deductError" style="color:var(--danger);font-size:11px;margin-bottom:8px;"></div>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="document.getElementById('modalOverlay').classList.remove('active')">Cancel</button>
          <button class="modal-btn danger" id="confirmDeduct">Deduct</button>
        </div>
      `);
      setTimeout(() => {
        document.getElementById('confirmDeduct').addEventListener('click', async () => {
          const amount = parseFloat(document.getElementById('deductAmount').value);
          const reason = document.getElementById('deductReason').value || 'Admin deduction';
          if (!amount || amount <= 0) { document.getElementById('deductError').textContent = 'Enter valid amount.'; return; }
          if (amount > (user.balance||0)) { document.getElementById('deductError').textContent = 'Exceeds balance.'; return; }
          const btn = document.getElementById('confirmDeduct');
          btn.disabled = true; btn.textContent = '...';
          try {
            await updateDoc(doc(db, 'users', user.uid), { balance: increment(-amount) });
            const txnId = `deduct_${Date.now()}`;
            await setDoc(doc(db, 'users', user.uid, 'transactions', txnId), { type: 'withdraw', amount, description: reason, status: 'completed', createdAt: serverTimestamp() });
            toast('success','Deducted',`$${amount.toFixed(2)} removed.`);
            closeModal(); loadUsers();
          } catch(e) { document.getElementById('deductError').textContent = e.message; btn.disabled = false; btn.textContent = 'Deduct'; }
        });
      }, 100);
    }

    async function toggleStatus(user, newStatus) {
      if (newStatus === 'suspended' && !confirm(`Suspend ${user.username}?`)) return;
      try {
        await updateDoc(doc(db, 'users', user.uid), { status: newStatus });
        toast('success','Updated',`${user.username} is now ${newStatus}.`);
        loadUsers();
      } catch(e) { toast('error','Failed',e.message); }
    }

    function deleteUser(user) {
      openModal(`
        <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3 style="color:var(--danger);">⚠️ Delete ${user.username}?</h3>
        <p style="font-size:12px;color:var(--text-muted);">Balance: $${(user.balance||0).toFixed(2)}. This cannot be undone.</p>
        <input type="text" class="modal-input" id="deleteConfirm" placeholder='Type "DELETE"' style="text-align:center;font-weight:700;" />
        <div id="deleteError" style="color:var(--danger);font-size:11px;margin-bottom:8px;"></div>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="document.getElementById('modalOverlay').classList.remove('active')">Cancel</button>
          <button class="modal-btn danger" id="confirmDelete">Delete</button>
        </div>
      `);
      setTimeout(() => {
        document.getElementById('confirmDelete').addEventListener('click', async () => {
          if (document.getElementById('deleteConfirm').value.trim() !== 'DELETE') { document.getElementById('deleteError').textContent = 'Type DELETE.'; return; }
          const btn = document.getElementById('confirmDelete');
          btn.disabled = true; btn.textContent = '...';
          try {
            await setDoc(doc(db, 'deletedUsers', user.uid), { ...user, deletedAt: serverTimestamp(), deletedBy: currentAdmin.uid });
            await updateDoc(doc(db, 'users', user.uid), { status: 'deleted', deletedAt: serverTimestamp() });
            toast('success','Deleted',`${user.username} removed.`);
            closeModal(); loadUsers();
          } catch(e) { document.getElementById('deleteError').textContent = e.message; btn.disabled = false; btn.textContent = 'Delete'; }
        });
      }, 100);
    }
  </script>
</body>
</html>
