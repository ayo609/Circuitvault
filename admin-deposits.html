<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Circuit Vault — Admin Deposits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #06090e; --bg-panel: #0c1119; --bg-panel-2: #0a0f16;
      --line: #1a2330; --line-soft: #141d28; --copper: #c77b3f;
      --teal: #00d9b5; --teal-dim: #0a4a40; --gold: #e8b84c;
      --text: #e7ecef; --text-muted: #7c8894; --danger: #e5566b;
      --purple: #a78bfa; --blue: #60a5fa;
      --radius: 16px; --radius-sm: 12px; --nav-height: 68px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg); color: var(--text);
      font-family: "Inter", sans-serif; min-height: 100vh;
      position: relative; overflow-x: hidden;
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 20px);
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(var(--line-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 50% at 50% 30%, black 20%, transparent 70%);
      opacity: 0.35; z-index: 0; pointer-events: none;
    }
    .app-container {
      position: relative; z-index: 1; max-width: 1100px;
      margin: 0 auto; padding: 20px 16px 0;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 14px 18px;
    }
    .topbar h1 { font-family: "Space Grotesk", sans-serif; font-size: 20px; font-weight: 700; }
    .stats-mini { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat-mini {
      background: var(--bg-panel); border: 1px solid var(--line);
      border-radius: 10px; padding: 10px 16px; text-align: center;
    }
    .stat-mini-value { font-family: "Space Grotesk", sans-serif; font-size: 18px; font-weight: 700; }
    .stat-mini-value.gold { color: var(--gold); }
    .stat-mini-value.teal { color: var(--teal); }
    .stat-mini-value.danger { color: var(--danger); }
    .stat-mini-label {
      font-family: "JetBrains Mono", monospace; font-size: 8px;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); margin-top: 2px;
    }
    .controls-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 200px; background: #0b0f14;
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 16px; color: var(--text);
      font-family: "Inter", sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,217,181,0.1); }
    .filter-select {
      background: #0b0f14; border: 1px solid var(--line);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: "Inter", sans-serif; font-size: 13px;
      outline: none; cursor: pointer;
    }
    .table-container {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line); border-radius: var(--radius);
      overflow-x: auto; margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; min-width: 850px; }
    th {
      font-family: "JetBrains Mono", monospace; font-size: 8px;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); text-align: left;
      padding: 12px 14px; background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--line); white-space: nowrap;
    }
    td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid var(--line-soft); }
    tr:hover td { background: rgba(255,255,255,0.01); }
    tr:last-child td { border-bottom: none; }
    .status-badge {
      font-family: "JetBrains Mono", monospace; font-size: 7px;
      letter-spacing: 0.05em; padding: 3px 8px; border-radius: 12px;
      font-weight: 600; text-transform: uppercase; white-space: nowrap;
    }
    .status-badge.pending { background: rgba(232,184,76,0.12); color: var(--gold); }
    .status-badge.credited { background: rgba(0,217,181,0.12); color: var(--teal); }
    .status-badge.rejected { background: rgba(229,86,107,0.12); color: var(--danger); }
    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn {
      padding: 4px 8px; border-radius: 4px;
      font-family: "JetBrains Mono", monospace; font-size: 8px;
      font-weight: 600; cursor: pointer;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03); color: var(--text-muted);
      transition: all 0.2s; white-space: nowrap;
    }
    .action-btn:hover { border-color: var(--teal); color: var(--teal); }
    .action-btn.approve { color: var(--teal); border-color: rgba(0,217,181,0.3); }
    .action-btn.approve:hover { background: rgba(0,217,181,0.1); }
    .action-btn.reject { color: var(--danger); border-color: rgba(229,86,107,0.3); }
    .action-btn.reject:hover { background: rgba(229,86,107,0.1); }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
    .page-btn {
      padding: 8px 14px; background: var(--bg-panel);
      border: 1px solid var(--line); border-radius: 8px;
      color: var(--text-muted); cursor: pointer;
      font-family: "JetBrains Mono", monospace; font-size: 11px; transition: all 0.2s;
    }
    .page-btn:hover { border-color: var(--teal); color: var(--teal); }
    .page-btn.active { background: rgba(0,217,181,0.1); border-color: var(--teal); color: var(--teal); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 200; display: none; align-items: center;
      justify-content: center; backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line); border-radius: var(--radius);
      width: 90%; max-width: 560px; max-height: 85vh;
      overflow-y: auto; padding: 28px 24px;
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 { font-family: "Space Grotesk", sans-serif; font-size: 18px; margin-bottom: 16px; }
    .modal .close-btn { float: right; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
    .modal .close-btn:hover { color: var(--text); }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line-soft); font-size: 12px; }
    .detail-row .label { color: var(--text-muted); }
    .detail-row .value { font-weight: 500; text-align: right; }
    .receipt-image { width: 100%; max-height: 300px; object-fit: contain; border-radius: 10px; border: 1px solid var(--line); margin: 10px 0; }
    .modal-input { width: 100%; background: #0b0f14; border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: "Inter", sans-serif; font-size: 13px; outline: none; margin-bottom: 10px; }
    .modal-input:focus { border-color: var(--teal); }
    .modal-label { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: block; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 10px; font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; border: none; transition: all 0.2s; }
    .modal-btn.approve { background: linear-gradient(135deg, var(--teal), #00b894); color: #12100a; }
    .modal-btn.approve:hover { filter: brightness(1.1); }
    .modal-btn.reject { background: rgba(229,86,107,0.15); border: 1px solid rgba(229,86,107,0.3); color: var(--danger); }
    .modal-btn.reject:hover { background: rgba(229,86,107,0.25); }
    .modal-btn.cancel { background: transparent; border: 1px solid var(--line); color: var(--text-muted); }
    .modal-btn.cancel:hover { border-color: var(--teal); color: var(--teal); }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast-stack { position: fixed; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 999; width: min(320px, calc(100vw - 32px)); }
    .toast {
      background: var(--bg-panel); border: 1px solid var(--line);
      border-left: 3px solid var(--teal); border-radius: 12px;
      padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start;
      box-shadow: 0 20px 50px -15px rgba(0,0,0,0.6);
      transform: translateX(120%); opacity: 0;
      animation: toastIn 0.35s cubic-bezier(0.2,0.8,0.2,1) forwards;
    }
    .toast.leaving { animation: toastOut 0.25s ease forwards; }
    @keyframes toastIn { to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }
    .toast.success { border-left-color: var(--teal); }
    .toast.error { border-left-color: var(--danger); }
    .toast.info { border-left-color: var(--gold); }
    .toast-icon { width: 18px; height: 18px; flex: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700; }
    .toast.success .toast-icon { background: rgba(0,217,181,0.15); color: var(--teal); }
    .toast.error .toast-icon { background: rgba(229,86,107,0.15); color: var(--danger); }
    .toast.info .toast-icon { background: rgba(232,184,76,0.15); color: var(--gold); }
    .toast-body { flex: 1; }
    .toast-title { font-size: 12.5px; font-weight: 600; margin-bottom: 2px; }
    .toast-msg { font-size: 11.5px; color: var(--text-muted); line-height: 1.4; }
    .toast-close { background: none; border: none; color: #4d5a66; cursor: pointer; font-size: 13px; padding: 2px; }
    .toast-close:hover { color: var(--text); }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: linear-gradient(180deg, rgba(12,17,25,0.98) 0%, rgba(6,9,14,0.99) 100%);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 2px solid var(--line);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 2px; padding-bottom: var(--safe-bottom); z-index: 100; overflow-x: auto;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 8px; border-radius: 8px; text-decoration: none;
      color: var(--text-muted); transition: all 0.2s;
      min-width: 56px; cursor: pointer; position: relative; flex-shrink: 0;
    }
    .nav-item svg { width: 20px; height: 20px; }
    .nav-item span { font-size: 8px; font-weight: 500; letter-spacing: 0.03em; white-space: nowrap; }
    .nav-item.active { color: #f87171; }
    .nav-item.active::before { content: ""; position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 18px; height: 2px; background: #f87171; border-radius: 0 0 4px 4px; }
    .nav-item:hover { color: #f87171; }
    .nav-item:active { transform: scale(0.92); }
    @media (max-width: 768px) { .nav-item span { font-size: 7px; } }
  </style>
</head>
<body>

  <div class="toast-stack" id="toastStack"></div>
  <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

  <div class="app-container">
    <div class="topbar">
      <h1>💰 Deposit Management</h1>
      <div class="stats-mini">
        <div class="stat-mini"><div class="stat-mini-value teal" id="totalCredited">$0</div><div class="stat-mini-label">Credited</div></div>
        <div class="stat-mini"><div class="stat-mini-value gold" id="totalPending">0</div><div class="stat-mini-label">Pending</div></div>
        <div class="stat-mini"><div class="stat-mini-value danger" id="totalRejected">0</div><div class="stat-mini-label">Rejected</div></div>
      </div>
    </div>

    <div class="controls-row">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by user, ID, or network..." />
      <select class="filter-select" id="filterStatus">
        <option value="all">All Status</option>
        <option value="pending">⏳ Pending</option>
        <option value="credited">✅ Credited</option>
        <option value="rejected">❌ Rejected</option>
      </select>
    </div>

    <div class="table-container">
      <table>
        <thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Network</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="depositsTableBody"><tr><td colspan="7"><div class="empty-state">Loading...</div></td></tr></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="admin-dashboard.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="8" height="8" rx="1.5"/><rect x="14" y="2" width="8" height="8" rx="1.5"/><rect x="2" y="14" width="8" height="8" rx="1.5"/><rect x="14" y="14" width="8" height="8" rx="1.5"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="admin-users.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
      <span>Users</span>
    </a>
    <a href="admin-deposits.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 4v14M6 12l6 6 6-6"/><path d="M4 22h16"/></svg>
      <span>Deposits</span>
    </a>
    <a href="admin-plans.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>
      <span>Plans</span>
    </a>
    <a href="admin-referrals.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><circle cx="17" cy="17" r="3"/><path d="M12 10l3.5 4.5"/></svg>
      <span>Referrals</span>
    </a>
    <a href="admin-settings.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      <span>Settings</span>
    </a>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp,
      collection, query, where, getDocs, orderBy, limit, increment
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBGYofP0i5qwQHpvlt8KynRYbE7tVuk2rw",
      authDomain: "circuit-vault-25fc5.firebaseapp.com",
      projectId: "circuit-vault-25fc5",
      storageBucket: "circuit-vault-25fc5.firebasestorage.app",
      messagingSenderId: "721270431353",
      appId: "1:721270431353:web:8d43b3176a14e665953ea8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const stack = document.getElementById('toastStack');
    function toast(type, title, msg, ms = 4000) {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      const icon = type === 'success' ? '✓' : type === 'error' ? '!' : 'i';
      el.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close" aria-label="Dismiss">✕</button>`;
      stack.appendChild(el);
      const remove = () => { el.classList.add('leaving'); setTimeout(() => el.remove(), 250); };
      el.querySelector('.toast-close').addEventListener('click', remove);
      if (ms) setTimeout(remove, ms);
    }

    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    function openModal(html) { modalContent.innerHTML = html; modalOverlay.classList.add('active'); }
    function closeModal() { modalOverlay.classList.remove('active'); }
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

    let allDeposits = [];
    let currentAdmin = null;
    const PER_PAGE = 15;
    let currentPage = 1;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'admin-login.html'; return; }
      const snap = await getDoc(doc(db, 'admins', user.uid));
      if (!snap.exists()) { await signOut(auth); window.location.href = 'admin-login.html'; return; }
      currentAdmin = user;
      loadDeposits();
    });

    document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderTable(); });
    document.getElementById('filterStatus').addEventListener('change', () => { currentPage = 1; renderTable(); });

    async function loadDeposits() {
      try {
        const snap = await getDocs(query(collection(db, 'deposits'), orderBy('createdAt', 'desc'), limit(200)));
        allDeposits = [];
        snap.forEach(d => allDeposits.push({ id: d.id, ...d.data() }));
        updateStats();
        renderTable();
      } catch (e) {
        console.error('Load error:', e);
        document.getElementById('depositsTableBody').innerHTML = '<tr><td colspan="7"><div class="empty-state">Error loading. Check console.</div></td></tr>';
      }
    }

    function updateStats() {
      let credited = 0, pending = 0, rejected = 0;
      allDeposits.forEach(d => {
        if (d.status === 'credited') credited += (d.amount || 0);
        if (d.status === 'pending') pending++;
        if (d.status === 'rejected') rejected++;
      });
      document.getElementById('totalCredited').textContent = '$' + credited.toLocaleString('en-US', { minimumFractionDigits: 2 });
      document.getElementById('totalPending').textContent = pending;
      document.getElementById('totalRejected').textContent = rejected;
    }

    function getFiltered() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('filterStatus').value;
      return allDeposits.filter(d => {
        const matchSearch = !search || (d.fullName||'').toLowerCase().includes(search) || (d.id||'').toLowerCase().includes(search) || (d.network||'').toLowerCase().includes(search) || (d.userId||'').toLowerCase().includes(search);
        const matchStatus = status === 'all' || d.status === status;
        return matchSearch && matchStatus;
      });
    }

    function renderTable() {
      const filtered = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const pageData = filtered.slice(start, start + PER_PAGE);
      const tbody = document.getElementById('depositsTableBody');

      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">No deposits found</div></td></tr>';
      } else {
        tbody.innerHTML = pageData.map(d => {
          const amount = (d.amount || 0).toFixed(2);
          const date = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
          return `<tr>
            <td style="font-family:'JetBrains Mono',monospace;font-size:10px;">${d.id?.slice(0,14)}...</td>
            <td><div style="font-weight:600;">${d.fullName||'Unknown'}</div><div style="font-size:10px;color:var(--text-muted);">${d.phone||'—'}</div></td>
            <td style="font-weight:700;">$${amount}</td>
            <td><span style="font-size:11px;color:var(--text-muted);">${d.network||'—'}</span></td>
            <td style="font-size:11px;color:var(--text-muted);">${date}</td>
            <td><span class="status-badge ${d.status||'pending'}">${d.status||'pending'}</span></td>
            <td><div class="action-btns">
              <button class="action-btn" data-action="view" data-id="${d.id}">👁</button>
              ${d.status==='pending'?`<button class="action-btn approve" data-action="approve" data-id="${d.id}">✓</button><button class="action-btn reject" data-action="reject" data-id="${d.id}">✕</button>`:''}
            </div></td>
          </tr>`;
        }).join('');
      }

      const pag = document.getElementById('pagination');
      if (totalPages <= 1) { pag.innerHTML = ''; return; }
      let html = `<button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}">←</button>`;
      for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      html += `<button class="page-btn" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">→</button>`;
      pag.innerHTML = html;
      pag.querySelectorAll('.page-btn:not([disabled])').forEach(b => {
        b.addEventListener('click', () => { currentPage = parseInt(b.dataset.page); renderTable(); });
      });
    }

    // ═══════════ ACTIONS ═══════════
    document.getElementById('depositsTableBody').addEventListener('click', (e) => {
      const btn = e.target.closest('.action-btn');
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      const deposit = allDeposits.find(d => d.id === id);
      if (!deposit) return;
      if (action === 'view') viewDeposit(deposit);
      if (action === 'approve') approveDeposit(deposit);
      if (action === 'reject') showRejectModal(deposit);
    });

    function viewDeposit(d) {
      const amount = (d.amount||0).toFixed(2);
      const date = d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleString() : '—';
      const receipt = d.receiptBase64 || '';
      openModal(`
        <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3>📄 Deposit Details</h3>
        <div class="detail-row"><span class="label">ID</span><span class="value" style="font-family:'JetBrains Mono',monospace;font-size:10px;">${d.id}</span></div>
        <div class="detail-row"><span class="label">User</span><span class="value">${d.fullName||'—'}</span></div>
        <div class="detail-row"><span class="label">Phone</span><span class="value">${d.phone||'—'}</span></div>
        <div class="detail-row"><span class="label">Amount</span><span class="value" style="color:var(--teal);font-weight:700;">$${amount}</span></div>
        <div class="detail-row"><span class="label">Network</span><span class="value">${d.network||'—'}</span></div>
        <div class="detail-row"><span class="label">Date</span><span class="value">${date}</span></div>
        <div class="detail-row"><span class="label">Status</span><span class="value"><span class="status-badge ${d.status}">${d.status}</span></span></div>
        <div class="detail-row"><span class="label">User ID</span><span class="value" style="font-family:'JetBrains Mono',monospace;font-size:10px;">${d.userId||'—'}</span></div>
        ${receipt?`<div class="modal-label" style="margin-top:12px;">📸 Receipt</div><img src="${receipt}" class="receipt-image" onerror="this.style.display='none';" />`:'<p style="color:var(--text-muted);text-align:center;margin-top:12px;">No receipt</p>'}
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="document.getElementById('modalOverlay').classList.remove('active')">Close</button>
          ${d.status==='pending'?`<button class="modal-btn approve" id="modalApprove">✓ Approve</button><button class="modal-btn reject" id="modalReject">✕ Reject</button>`:''}
        </div>
      `);
      if (d.status==='pending') setTimeout(() => {
        document.getElementById('modalApprove')?.addEventListener('click',()=>{closeModal();approveDeposit(d);});
        document.getElementById('modalReject')?.addEventListener('click',()=>{closeModal();showRejectModal(d);});
      },100);
    }

    // ✅ FIXED: Approve deposit with proper error handling and NO composite index queries
    async function approveDeposit(d) {
      if (!confirm(`Approve $${(d.amount||0).toFixed(2)} deposit from ${d.fullName}?`)) return;
      const uid = d.userId;
      if (!uid) { toast('error','Error','No user ID associated with this deposit.'); return; }

      try {
        // Step 1: Update deposit status
        await updateDoc(doc(db, 'deposits', d.id), {
          status: 'credited', reviewedBy: currentAdmin.uid, reviewedAt: serverTimestamp()
        });

        // Step 2: Credit user balance
        await updateDoc(doc(db, 'users', uid), {
          balance: increment(d.amount || 0), depositCount: increment(1)
        });

        // Step 3: Update user's transaction — fetch ALL deposit transactions and find matching one
        try {
          const txnSnap = await getDocs(query(
            collection(db, 'users', uid, 'transactions'),
            where('type', '==', 'deposit')
          ));
          for (const txn of txnSnap.docs) {
            const data = txn.data();
            if (data.status === 'pending' && Math.abs((data.amount||0) - (d.amount||0)) < 0.01) {
              await updateDoc(doc(db, 'users', uid, 'transactions', txn.id), { status: 'credited' });
              break;
            }
          }
        } catch (txnErr) { console.warn('Transaction update skipped:', txnErr); }

        // Step 4: Log admin action ✅ FIXED: Use setDoc instead of broken updateDoc
        await setDoc(doc(db, 'adminLogs', `approve_${Date.now()}`), {
          adminId: currentAdmin.uid,
          action: 'approve_deposit',
          depositId: d.id,
          targetUserId: uid,
          amount: d.amount,
          createdAt: serverTimestamp()
        });

        toast('success','Deposit Approved',`$${(d.amount||0).toFixed(2)} credited to user.`);
        loadDeposits();
      } catch (e) {
        console.error('Approve error:', e);
        toast('error','Failed', e.message || 'Could not approve deposit.');
      }
    }

    function showRejectModal(d) {
      openModal(`
        <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3 style="color:var(--danger);">✕ Reject Deposit</h3>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Rejecting <strong>$${(d.amount||0).toFixed(2)}</strong> from <strong>${d.fullName}</strong>.</p>
        <label class="modal-label">Reason</label>
        <input type="text" class="modal-input" id="rejectReason" placeholder="e.g., Invalid receipt" />
        <div id="rejectError" style="color:var(--danger);font-size:11px;margin-bottom:8px;"></div>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="document.getElementById('modalOverlay').classList.remove('active')">Cancel</button>
          <button class="modal-btn reject" id="confirmReject">Reject</button>
        </div>
      `);
      setTimeout(() => {
        document.getElementById('confirmReject').addEventListener('click', async () => {
          const reason = document.getElementById('rejectReason').value || 'No reason';
          const btn = document.getElementById('confirmReject');
          btn.disabled = true; btn.textContent = '...';
          try {
            await updateDoc(doc(db, 'deposits', d.id), {
              status: 'rejected', rejectReason: reason,
              reviewedBy: currentAdmin.uid, reviewedAt: serverTimestamp()
            });
            if (d.userId) {
              try {
                const txnSnap = await getDocs(query(collection(db, 'users', d.userId, 'transactions'), where('type','==','deposit')));
                for (const txn of txnSnap.docs) {
                  if (txn.data().status==='pending' && Math.abs((txn.data().amount||0)-(d.amount||0))<0.01) {
                    await updateDoc(doc(db, 'users', d.userId, 'transactions', txn.id), { status: 'rejected' });
                    break;
                  }
                }
              } catch(e) { /* */ }
            }
            toast('success','Deposit Rejected',`$${(d.amount||0).toFixed(2)} rejected.`);
            closeModal(); loadDeposits();
          } catch(e) { document.getElementById('rejectError').textContent = e.message; btn.disabled = false; btn.textContent = 'Reject'; }
        });
      }, 100);
    }
  </script>
</body>
</html>
