<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Circuit Vault — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#090c10; --bg-panel:#10151b; --bg-panel-2:#0d1218;
    --line:#1e2731; --line-soft:#161d25;
    --copper:#c77b3f; --teal:#00d9b5; --gold:#e8b84c;
    --text:#e7ecef; --text-muted:#7c8894; --danger:#e5566b; --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text); font-family:'Inter', sans-serif;
    min-height:100vh; position:relative; overflow-x:hidden;
    display:flex; align-items:flex-start; justify-content:center;
    padding:64px 20px 80px;
  }
  body::before{
    content:""; position:fixed; inset:0;
    background-image:linear-gradient(var(--line-soft) 1px, transparent 1px), linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(ellipse 80% 60% at 50% 20%, black 30%, transparent 75%);
    opacity:0.55; z-index:0; pointer-events:none;
  }
  body::after{
    content:""; position:fixed; top:-20%; left:50%; width:900px; height:900px; transform:translateX(-50%);
    background:radial-gradient(circle, rgba(0,217,181,0.10) 0%, transparent 65%);
    z-index:0; pointer-events:none;
  }
  .wrap{ position:relative; z-index:1; width:100%; max-width:420px; }
  .brand{ text-align:center; margin-bottom:34px; }
  .brand-mark{ display:inline-flex; align-items:center; gap:10px; margin-bottom:14px; }
  .brand-mark svg{ width:26px; height:26px; }
  .eyebrow{ font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.32em; color:var(--teal); text-transform:uppercase; margin-bottom:10px; }
  h1.wordmark{
    font-family:'Space Grotesk', sans-serif; font-size:34px; font-weight:700; letter-spacing:0.02em; line-height:1;
    background:linear-gradient(135deg, #f2f5f6 20%, var(--gold) 65%, var(--copper) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .tagline{ margin-top:10px; font-size:13.5px; color:var(--text-muted); }

  .panel{
    position:relative;
    background:linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
    border:1px solid var(--line); border-radius:var(--radius);
    padding:34px 30px 30px 42px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;
  }
  .trace-rail{ position:absolute; left:16px; top:34px; bottom:96px; width:2px; background:var(--line); z-index:1; }
  .trace-rail::before{
    content:""; position:absolute; left:0; top:0; width:100%; height:var(--charge, 0%);
    background:linear-gradient(180deg, var(--teal), transparent); box-shadow:0 0 10px var(--teal);
    transition:height .5s ease;
  }
  .field{ position:relative; margin-bottom:20px; }
  .pin{
    position:absolute; left:-26px; top:38px; width:9px; height:9px; border-radius:50%;
    background:var(--line); border:2px solid var(--bg-panel-2); box-shadow:0 0 0 1px var(--line);
    transition:background .25s, box-shadow .25s; z-index:2;
  }
  .field.valid .pin{ background:var(--teal); box-shadow:0 0 8px var(--teal), 0 0 0 1px var(--teal); }
  .field.invalid .pin{ background:var(--danger); box-shadow:0 0 8px var(--danger), 0 0 0 1px var(--danger); }
  label{ display:block; font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .input-row{ position:relative; }
  input{
    width:100%; background:#0b0f14; border:1px solid var(--line); border-radius:10px; padding:14px 16px;
    color:var(--text); font-family:'Inter', sans-serif; font-size:14.5px; outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  input::placeholder{ color:#4a5661; font-family:'JetBrains Mono', monospace; font-size:13px; }
  input:focus{ border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,217,181,0.12); }
  .field.invalid input{ border-color:var(--danger); }
  .toggle-vis{
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.12em; color:var(--gold); padding:4px 6px;
  }
  .toggle-vis:hover{ color:#fff; }
  .hint{ margin-top:6px; font-size:11.5px; color:var(--text-muted); min-height:14px; }
  .hint.err{ color:var(--danger); }
  .row-between{ display:flex; justify-content:flex-end; margin-bottom:20px; }
  .forgot{ font-size:12px; color:var(--text-muted); text-decoration:none; border-bottom:1px dashed #3a4753; }
  .forgot:hover{ color:var(--gold); border-color:var(--gold); }
  button.cta{
    width:100%; margin-top:6px; border:none; border-radius:10px; padding:16px;
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:14.5px; letter-spacing:0.06em; text-transform:uppercase;
    color:#12100a; background:linear-gradient(135deg, var(--gold), var(--copper)); cursor:pointer;
    position:relative; overflow:hidden; transition:transform .15s, filter .2s;
    box-shadow:0 10px 24px -10px rgba(232,184,76,0.25);
  }
  button.cta:hover{ filter:brightness(1.08); }
  button.cta:active{ transform:translateY(1px) scale(0.995); }
  button.cta:disabled{ opacity:0.55; cursor:not-allowed; filter:none; }
  button.cta .spinner{ display:none; width:15px; height:15px; border-radius:50%; border:2px solid rgba(18,16,10,0.35); border-top-color:#12100a; animation:spin .7s linear infinite; margin:0 auto; }
  button.cta.loading .label{ display:none; }
  button.cta.loading .spinner{ display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .switch-line{ text-align:center; margin-top:22px; font-size:13px; color:var(--text-muted); }
  .switch-line a{ color:var(--gold); text-decoration:none; font-weight:600; border-bottom:1px solid rgba(232,184,76,0.35); }
  .switch-line a:hover{ color:#fff; border-color:#fff; }
  .footnote{ text-align:center; margin-top:20px; font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.1em; color:#39434d; }

  .toast-stack{ position:fixed; top:20px; left:20px; display:flex; flex-direction:column; gap:10px; z-index:999; width:min(340px, calc(100vw - 40px)); }
  .toast{
    background:var(--bg-panel); border:1px solid var(--line); border-left:3px solid var(--teal); border-radius:10px;
    padding:13px 14px; display:flex; gap:11px; align-items:flex-start; box-shadow:0 18px 40px -14px rgba(0,0,0,0.55);
    transform:translateX(-120%); opacity:0; animation:toast-in .35s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .toast.leaving{ animation:toast-out .3s ease forwards; }
  @keyframes toast-in{ to{ transform:translateX(0); opacity:1; } }
  @keyframes toast-out{ to{ transform:translateX(-120%); opacity:0; } }
  .toast.success{ border-left-color:var(--teal); }
  .toast.error{ border-left-color:var(--danger); }
  .toast.info{ border-left-color:var(--gold); }
  .toast-icon{ width:20px; height:20px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:700; margin-top:1px; }
  .toast.success .toast-icon{ background:rgba(0,217,181,0.15); color:var(--teal); }
  .toast.error .toast-icon{ background:rgba(229,86,107,0.15); color:var(--danger); }
  .toast.info .toast-icon{ background:rgba(232,184,76,0.15); color:var(--gold); }
  .toast-body{ flex:1; }
  .toast-title{ font-size:13px; font-weight:600; margin-bottom:2px; }
  .toast-msg{ font-size:12px; color:var(--text-muted); line-height:1.4; }
  .toast-close{ background:none; border:none; color:#4d5a66; cursor:pointer; font-size:14px; line-height:1; padding:2px; }
  .toast-close:hover{ color:var(--text); }

  @media (max-width:480px){ .panel{ padding:28px 20px 26px 34px; } .trace-rail{ left:12px; } .pin{ left:-20px; } }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.001s !important; transition-duration:0.001s !important; } }
</style>
</head>
<body>

<div class="toast-stack" id="toastStack"></div>

<div class="wrap">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="4" stroke="#e8b84c" stroke-width="1.4"/>
        <circle cx="8" cy="8" r="1.6" fill="#00d9b5"/>
        <circle cx="16" cy="16" r="1.6" fill="#00d9b5"/>
        <path d="M8 9.6V14a2 2 0 0 0 2 2h4.4" stroke="#00d9b5" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="eyebrow">Engineered Wealth · USD Vault</div>
    <h1 class="wordmark">CIRCUIT VAULT</h1>
    <p class="tagline">Reconnect to your vault.</p>
  </div>

  <form class="panel" id="loginForm" novalidate>
    <div class="trace-rail" id="traceRail"></div>

    <div class="field" id="f-email">
      <span class="pin"></span>
      <label for="email">Email address</label>
      <div class="input-row">
        <input id="email" name="email" type="email" placeholder="you@circuitvault.com" autocomplete="email" />
      </div>
      <div class="hint" id="hint-email">&nbsp;</div>
    </div>

    <div class="field" id="f-password">
      <span class="pin"></span>
      <label for="password">Password</label>
      <div class="input-row">
        <input id="password" name="password" type="password" placeholder="Your password" autocomplete="current-password" />
        <button type="button" class="toggle-vis" data-target="password">SHOW</button>
      </div>
      <div class="hint" id="hint-password">&nbsp;</div>
    </div>

    <div class="row-between">
      <a class="forgot" href="reset.html">Forgot password?</a>
    </div>

    <button type="submit" class="cta" id="submitBtn">
      <span class="label">Unlock Vault</span>
      <span class="spinner"></span>
    </button>

    <p class="switch-line">New here? <a href="index.html">Create an account</a></p>
  </form>

  <p class="footnote">256-BIT ENCRYPTED · FIRESTORE SECURED · USD DENOMINATED</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBGYofP0i5qwQHpvlt8KynRYbE7tVuk2rw",
    authDomain: "circuit-vault-25fc5.firebaseapp.com",
    projectId: "circuit-vault-25fc5",
    storageBucket: "circuit-vault-25fc5.firebasestorage.app",
    messagingSenderId: "721270431353",
    appId: "1:721270431353:web:8d43b3176a14e665953ea8"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const stack = document.getElementById('toastStack');
  function toast(type, title, msg, ms = 4200) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    const icon = type === 'success' ? '✓' : type === 'error' ? '!' : 'i';
    el.innerHTML = `
      <div class="toast-icon">${icon}</div>
      <div class="toast-body">
        <div class="toast-title">${title}</div>
        <div class="toast-msg">${msg}</div>
      </div>
      <button class="toast-close" aria-label="Dismiss">✕</button>`;
    stack.appendChild(el);
    const remove = () => { el.classList.add('leaving'); setTimeout(() => el.remove(), 280); };
    el.querySelector('.toast-close').addEventListener('click', remove);
    if (ms) setTimeout(remove, ms);
  }

  const form = document.getElementById('loginForm');
  const panel = form;
  const submitBtn = document.getElementById('submitBtn');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const fields = { email: document.getElementById('f-email'), password: document.getElementById('f-password') };

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function chargeRail() {
    let done = 0;
    if (fields.email.classList.contains('valid')) done++;
    if (fields.password.classList.contains('valid')) done++;
    panel.style.setProperty('--charge', Math.round((done / 2) * 100) + '%');
  }

  emailEl.addEventListener('input', () => {
    const val = emailEl.value.trim();
    fields.email.classList.remove('valid', 'invalid');
    if (val && EMAIL_RE.test(val)) fields.email.classList.add('valid');
    else if (val) fields.email.classList.add('invalid');
    chargeRail();
  });
  passwordEl.addEventListener('input', () => {
    fields.password.classList.remove('valid', 'invalid');
    if (passwordEl.value.length >= 8) fields.password.classList.add('valid');
    else if (passwordEl.value) fields.password.classList.add('invalid');
    chargeRail();
  });
  document.querySelector('.toggle-vis').addEventListener('click', (e) => {
    const target = document.getElementById(e.target.dataset.target);
    const showing = target.type === 'text';
    target.type = showing ? 'password' : 'text';
    e.target.textContent = showing ? 'SHOW' : 'HIDE';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailEl.value.trim();
    const password = passwordEl.value;

    if (!EMAIL_RE.test(email)) { toast('error', 'Check your email', 'Enter a valid email address.'); emailEl.focus(); return; }
    if (!password) { toast('error', 'Password required', 'Enter your password to continue.'); passwordEl.focus(); return; }

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    try {
      await signInWithEmailAndPassword(auth, email, password);
      toast('success', 'Welcome back', 'Vault unlocked — redirecting to your dashboard…', 3000);
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } catch (err) {
      let msg = 'Something went wrong. Please try again.';
      if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
        msg = 'Incorrect email or password.';
      } else if (err.code === 'auth/too-many-requests') {
        msg = 'Too many attempts — please wait a moment before trying again.';
      } else if (err.code === 'resource-exhausted' || /quota/i.test(err.message || '')) {
        msg = "We're experiencing high traffic — please wait a moment and try again.";
      }
      toast('error', 'Login failed', msg);
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
