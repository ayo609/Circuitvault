<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuit Vault — Admin Setup</title>
  <style>
    :root {
      --bg: #06090e;
      --bg-panel: #0c1119;
      --line: #1a2330;
      --teal: #00d9b5;
      --gold: #e8b84c;
      --text: #e7ecef;
      --text-muted: #7c8894;
      --danger: #e5566b;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 440px;
      width: 100%;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      margin-bottom: 6px;
    }
    p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: var(--teal); }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), #c77b3f);
      color: #12100a;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    .msg.success { background: rgba(0,217,181,0.1); color: var(--teal); }
    .msg.error { background: rgba(229,86,107,0.1); color: var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ Admin Setup</h1>
    <p>Create your first admin account. Use this <strong>only once</strong>, then delete this file.</p>
    
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@circuitvault.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" />
    </div>
    <div class="form-group">
      <label>Admin Name</label>
      <input type="text" id="name" placeholder="Admin" value="Admin" />
    </div>
    
    <button class="btn" id="setupBtn">🔧 Create Admin Account</button>
    <div class="msg" id="msg" style="display:none;"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBGYofP0i5qwQHpvlt8KynRYbE7tVuk2rw",
      authDomain: "circuit-vault-25fc5.firebaseapp.com",
      projectId: "circuit-vault-25fc5",
      storageBucket: "circuit-vault-25fc5.firebasestorage.app",
      messagingSenderId: "721270431353",
      appId: "1:721270431353:web:8d43b3176a14e665953ea8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('setupBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value.trim() || 'Admin';
      const msgEl = document.getElementById('msg');
      const btn = document.getElementById('setupBtn');

      if (!email || !password || password.length < 8) {
        msgEl.style.display = 'block';
        msgEl.className = 'msg error';
        msgEl.textContent = 'Enter a valid email and password (min. 8 characters).';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating...';
      msgEl.style.display = 'none';

      try {
        // Step 1: Create auth account
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const uid = cred.user.uid;

        // Step 2: Add to admins collection
        await setDoc(doc(db, 'admins', uid), {
          email,
          name,
          role: 'super_admin',
          status: 'active',
          createdAt: serverTimestamp()
        });

        // Step 3: Add to adminEmails
        const emailKey = email.toLowerCase().replace(/\./g, '_');
        await setDoc(doc(db, 'adminEmails', emailKey), {
          email,
          uid,
          role: 'super_admin'
        });

        // Step 4: Also create a basic user document (optional)
        await setDoc(doc(db, 'users', uid), {
          username: name.toLowerCase().replace(/\s+/g, '_'),
          usernameLower: name.toLowerCase().replace(/\s+/g, '_'),
          email,
          currency: 'USD',
          balance: 0,
          createdAt: serverTimestamp(),
          status: 'active'
        });

        msgEl.style.display = 'block';
        msgEl.className = 'msg success';
        msgEl.innerHTML = `
          ✅ <strong>Admin account created!</strong><br>
          Email: ${email}<br>
          UID: ${uid.slice(0, 12)}...<br><br>
          <a href="admin-login.html" style="color:var(--teal);">→ Go to Admin Login</a>
        `;

        btn.textContent = '✅ Done!';
      } catch (err) {
        console.error(err);
        msgEl.style.display = 'block';
        msgEl.className = 'msg error';
        if (err.code === 'auth/email-already-in-use') {
          msgEl.textContent = 'Email already exists. Try logging in instead, then manually add admin privileges via Firebase Console.';
        } else {
          msgEl.textContent = 'Error: ' + (err.message || 'Something went wrong');
        }
        btn.disabled = false;
        btn.textContent = '🔧 Create Admin Account';
      }
    });
  </script>
</body>
</html>
