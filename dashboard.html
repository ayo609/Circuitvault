<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuit Vault — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #090c10;
      --bg-panel: #10151b;
      --bg-panel-2: #0d1218;
      --line: #1e2731;
      --line-soft: #161d25;
      --copper: #c77b3f;
      --teal: #00d9b5;
      --teal-dim: #0a4a40;
      --gold: #e8b84c;
      --text: #e7ecef;
      --text-muted: #7c8894;
      --danger: #e5566b;
      --radius: 14px;
      --sidebar-w: 220px;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html,
    body {
      height: 100%;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      display: flex;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* blueprint grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--line-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 25%, transparent 70%);
      opacity: 0.45;
      z-index: 0;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      top: -20%;
      left: 50%;
      width: 900px;
      height: 900px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(0, 217, 181, 0.08) 0%, transparent 65%);
      z-index: 0;
      pointer-events: none;
    }

    /* sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border-right: 1px solid var(--line);
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: 28px 0 20px;
    }
    .side-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .side-brand svg {
      width: 24px;
      height: 24px;
    }
    .side-wordmark {
      font-family: "Space Grotesk", sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, #f2f5f6 20%, var(--gold) 65%, var(--copper) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 6px;
    }
    .side-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 12px;
    }
    .side-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .side-nav a:hover,
    .side-nav a.active {
      background: rgba(0, 217, 181, 0.08);
      color: var(--teal);
    }
    .side-nav a svg {
      width: 16px;
      height: 16px;
      flex: none;
      opacity: 0.7;
    }
    .side-nav a.active svg {
      opacity: 1;
    }
    .side-footer {
      padding: 0 12px;
      margin-top: auto;
    }
    .side-footer a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #5a6674;
      text-decoration: none;
    }
    .side-footer a:hover {
      color: var(--danger);
    }

    /* main */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px 36px 50px;
      position: relative;
      z-index: 1;
    }

    /* top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .greeting h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .greeting p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .icon-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .icon-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    /* cards row */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px 22px;
      position: relative;
    }
    .stat-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .stat-value.green {
      color: var(--teal);
    }
    .stat-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* section titles */
    .section-title {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line-soft);
    }

    /* ticker grid */
    .ticker-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .ticker-card {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px 14px;
      text-align: center;
      transition: border-color 0.25s;
    }
    .ticker-card:hover {
      border-color: var(--teal);
    }
    .ticker-symbol {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--gold);
    }
    .ticker-price {
      font-family: "Space Grotesk", sans-serif;
      font-size: 17px;
      font-weight: 700;
      margin: 6px 0 2px;
    }
    .ticker-change {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 500;
    }
    .ticker-change.up {
      color: var(--teal);
    }
    .ticker-change.down {
      color: var(--danger);
    }

    /* activity list */
    .activity-list {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }
    .activity-item:last-child {
      border-bottom: none;
    }
    .activity-desc {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .activity-desc .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
    }
    .activity-desc .dot.out {
      background: var(--danger);
    }
    .activity-time {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    /* quick actions */
    .quick-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1;
      min-width: 120px;
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 18px;
      text-align: center;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.25s, background 0.2s;
    }
    .action-btn:hover {
      border-color: var(--gold);
      background: rgba(232, 184, 76, 0.06);
    }
    .action-btn.primary {
      background: linear-gradient(135deg, var(--gold), var(--copper));
      color: #12100a;
      border: none;
      font-weight: 700;
    }
    .action-btn.primary:hover {
      filter: brightness(1.08);
    }

    /* referral box */
    .referral-box {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .referral-box .ref-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .referral-box .ref-link {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      color: var(--gold);
      word-break: break-all;
    }
    .copy-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .copy-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* toast stack – identical to index */
    .toast-stack {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 999;
      width: min(340px, calc(100vw - 40px));
    }
    .toast {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-left: 3px solid var(--teal);
      border-radius: 10px;
      padding: 13px 14px;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      box-shadow: 0 18px 40px -14px rgba(0, 0, 0, 0.55);
      transform: translateX(120%);
      opacity: 0;
      animation: toast-in 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .toast.leaving {
      animation: toast-out 0.3s ease forwards;
    }
    @keyframes toast-in {
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    @keyframes toast-out {
      to {
        transform: translateX(120%);
        opacity: 0;
      }
    }
    .toast.success {
      border-left-color: var(--teal);
    }
    .toast.error {
      border-left-color: var(--danger);
    }
    .toast.info {
      border-left-color: var(--gold);
    }
    .toast-icon {
      width: 20px;
      height: 20px;
      flex: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      margin-top: 1px;
    }
    .toast.success .toast-icon {
      background: rgba(0, 217, 181, 0.15);
      color: var(--teal);
    }
    .toast.error .toast-icon {
      background: rgba(229, 86, 107, 0.15);
      color: var(--danger);
    }
    .toast.info .toast-icon {
      background: rgba(232, 184, 76, 0.15);
      color: var(--gold);
    }
    .toast-body {
      flex: 1;
    }
    .toast-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .toast-msg {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .toast-close {
      background: none;
      border: none;
      color: #4d5a66;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 2px;
    }
    .toast-close:hover {
      color: var(--text);
    }

    /* responsive */
    @media (max-width: 860px) {
      .sidebar {
        width: 60px;
        padding: 20px 0;
      }
      .side-wordmark,
      .side-nav a span,
      .side-footer a span {
        display: none;
      }
      .side-nav a,
      .side-footer a {
        justify-content: center;
        padding: 10px;
      }
      .main {
        margin-left: 60px;
        padding: 20px 16px 40px;
      }
      .cards-row {
        grid-template-columns: 1fr 1fr;
      }
      .ticker-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 520px) {
      .cards-row {
        grid-template-columns: 1fr;
      }
      .ticker-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001s !important;
        transition-duration: 0.001s !important;
      }
    }
  </style>
</head>
<body>
  <!-- toast stack -->
  <div class="toast-stack" id="toastStack"></div>

  <!-- sidebar -->
  <aside class="sidebar">
    <div class="side-brand">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="4" stroke="#e8b84c" stroke-width="1.4" />
        <circle cx="8" cy="8" r="1.6" fill="#00d9b5" />
        <circle cx="16" cy="16" r="1.6" fill="#00d9b5" />
        <path d="M8 9.6V14a2 2 0 0 0 2 2h4.4" stroke="#00d9b5" stroke-width="1.3" stroke-linecap="round" />
      </svg>
      <div class="side-wordmark">CIRCUIT VAULT</div>
    </div>
    <nav class="side-nav">
      <a href="dashboard.html" class="active">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="deposit.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2v10M4 8l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <span>Deposit</span>
      </a>
      <a href="withdraw.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 14V4M4 8l4-4 4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <span>Withdraw</span>
      </a>
      <a href="history.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3" fill="none"/><polyline points="8,4 8,8 11,10" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
        <span>History</span>
      </a>
      <a href="referrals.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="11" cy="11" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="8" y1="7" x2="9.5" y2="9" stroke="currentColor" stroke-width="1.2"/></svg>
        <span>Referrals</span>
      </a>
      <a href="settings.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span>Settings</span>
      </a>
    </nav>
    <div class="side-footer">
      <a href="#" id="logoutBtn">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 2H3v12h3M11 11l4-3-4-3M15 8H7" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- main content -->
  <main class="main">
    <div class="topbar">
      <div class="greeting">
        <h2 id="greetingUser">Welcome back</h2>
        <p id="greetingDate"></p>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="refreshTickers" title="Refresh prices">⟳</button>
        <button class="icon-btn" title="Notifications">🔔</button>
      </div>
    </div>

    <!-- stats cards -->
    <div class="cards-row">
      <div class="stat-card">
        <div class="stat-label">Total Balance</div>
        <div class="stat-value" id="balanceDisplay">$0.00</div>
        <div class="stat-sub">USD · Available</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Yield</div>
        <div class="stat-value green" id="yieldDisplay">0%</div>
        <div class="stat-sub">All‑time return</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Deposits</div>
        <div class="stat-value" id="depositCount">0</div>
        <div class="stat-sub">Completed</div>
      </div>
    </div>

    <!-- live tickers -->
    <div class="section-title">Live Market</div>
    <div class="ticker-grid" id="tickerGrid">
      <!-- populated by JS -->
    </div>

    <!-- recent activity -->
    <div class="section-title">Recent Activity</div>
    <div class="activity-list" id="activityList">
      <div class="activity-item">
        <span class="activity-desc"><span class="dot"></span> Loading…</span>
        <span class="activity-time">—</span>
      </div>
    </div>

    <!-- quick actions -->
    <div class="quick-actions">
      <a href="deposit.html" class="action-btn primary">+ New Deposit</a>
      <a href="withdraw.html" class="action-btn">↑ Withdraw</a>
      <a href="referrals.html" class="action-btn">👥 Invite</a>
    </div>

    <!-- referral link -->
    <div class="referral-box">
      <div>
        <div class="ref-label">Your Referral Link</div>
        <div class="ref-link" id="refLink">vault.circuit/join/—</div>
      </div>
      <button class="copy-btn" id="copyRefBtn">Copy</button>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBGYofP0i5qwQHpvlt8KynRYbE7tVuk2rw",
      authDomain: "circuit-vault-25fc5.firebaseapp.com",
      projectId: "circuit-vault-25fc5",
      storageBucket: "circuit-vault-25fc5.firebasestorage.app",
      messagingSenderId: "721270431353",
      appId: "1:721270431353:web:8d43b3176a14e665953ea8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ---------- toast ----------
    const stack = document.getElementById('toastStack');
    function toast(type, title, msg, ms = 4200) {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      const icon = type === 'success' ? '✓' : type === 'error' ? '!' : 'i';
      el.innerHTML = `
        <div class="toast-icon">${icon}</div>
        <div class="toast-body">
          <div class="toast-title">${title}</div>
          <div class="toast-msg">${msg}</div>
        </div>
        <button class="toast-close" aria-label="Dismiss">✕</button>
      `;
      stack.appendChild(el);
      const remove = () => { el.classList.add('leaving'); setTimeout(() => el.remove(), 280); };
      el.querySelector('.toast-close').addEventListener('click', remove);
      if (ms) setTimeout(remove, ms);
      return el;
    }

    // ---------- auth gating ----------
    let currentUser = null;
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      document.getElementById('greetingUser').textContent = `Welcome, ${user.displayName || 'Builder'}`;
      loadUserData(user.uid);
      loadActivity(user.uid);
      loadReferral(user.uid);
    });

    // ---------- date ----------
    const dateEl = document.getElementById('greetingDate');
    dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // ---------- user data ----------
    async function loadUserData(uid) {
      try {
        const snap = await getDoc(doc(db, 'users', uid));
        if (!snap.exists()) return;
        const d = snap.data();
        document.getElementById('balanceDisplay').textContent = '$' + (d.balance || 0).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
        const yieldVal = d.totalYield || 0;
        document.getElementById('yieldDisplay').textContent = (yieldVal >= 0 ? '+' : '') + yieldVal.toFixed(1) + '%';
        document.getElementById('depositCount').textContent = d.depositCount || 0;
      } catch (e) {
        console.warn('User data load failed', e);
      }
    }

    // ---------- activity ----------
    async function loadActivity(uid) {
      const list = document.getElementById('activityList');
      try {
        const q = query(collection(db, 'users', uid, 'transactions'), orderBy('createdAt', 'desc'), limit(5));
        const snap = await getDocs(q);
        list.innerHTML = '';
        if (snap.empty) {
          list.innerHTML = '<div class="activity-item"><span class="activity-desc"><span class="dot"></span> No transactions yet</span><span class="activity-time">—</span></div>';
          return;
        }
        snap.forEach(doc => {
          const t = doc.data();
          const type = t.type || 'deposit';
          const dotClass = type === 'withdraw' ? 'out' : '';
          const amount = (t.amount || 0).toFixed(2);
          const prefix = type === 'withdraw' ? '-' : '+';
          const desc = t.description || type;
          const time = t.createdAt ? new Date(t.createdAt.seconds * 1000).toLocaleDateString() : '—';
          list.innerHTML += `
            <div class="activity-item">
              <span class="activity-desc"><span class="dot ${dotClass}"></span> ${prefix}$${amount} ${desc}</span>
              <span class="activity-time">${time}</span>
            </div>`;
        });
      } catch (e) {
        list.innerHTML = '<div class="activity-item">Could not load activity.</div>';
      }
    }

    // ---------- referral ----------
    async function loadReferral(uid) {
      try {
        const snap = await getDoc(doc(db, 'users', uid));
        if (!snap.exists()) return;
        const username = snap.data().usernameLower || snap.data().username || '—';
        document.getElementById('refLink').textContent = `vault.circuit/join/${username}`;
      } catch (e) { /* silent */ }
    }
    document.getElementById('copyRefBtn').addEventListener('click', () => {
      const text = document.getElementById('refLink').textContent;
      navigator.clipboard.writeText(text).then(() => toast('success','Copied','Referral link copied to clipboard.',2000));
    });

    // ---------- tickers (CoinGecko free API) ----------
    const COINS = ['bitcoin','ethereum','solana','polkadot','cardano','avalanche-2','matic-network','chainlink','ripple','cosmos'];
    const SYMBOLS = ['BTC','ETH','SOL','DOT','ADA','AVAX','MATIC','LINK','XRP','ATOM'];
    const grid = document.getElementById('tickerGrid');

    async function fetchTickers() {
      try {
        const ids = COINS.join(',');
        const resp = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
        if (!resp.ok) throw new Error('API limit');
        const data = await resp.json();
        grid.innerHTML = '';
        COINS.forEach((id, i) => {
          const coin = data[id];
          if (!coin) return;
          const price = coin.usd;
          const change = coin.usd_24h_change;
          const changeClass = change >= 0 ? 'up' : 'down';
          const changeSign = change >= 0 ? '+' : '';
          const formattedPrice = price >= 1 ? price.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }) : price.toPrecision(4);
          grid.innerHTML += `
            <div class="ticker-card">
              <div class="ticker-symbol">${SYMBOLS[i]}</div>
              <div class="ticker-price">$${formattedPrice}</div>
              <div class="ticker-change ${changeClass}">${changeSign}${change?.toFixed(2)}%</div>
            </div>`;
        });
      } catch (e) {
        grid.innerHTML = '<div class="ticker-card" style="grid-column:span 5;color:var(--text-muted);">Market data temporarily unavailable — retrying soon.</div>';
      }
    }

    fetchTickers();
    setInterval(fetchTickers, 60000); // refresh every 60s
    document.getElementById('refreshTickers').addEventListener('click', fetchTickers);

    // ---------- logout ----------
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
